name: build-and-push

# Builds the container and pushes it to GHCR. No secrets are baked into the
# image (all runtime config comes from k8s env vars); this workflow only needs
# the repo's own GITHUB_TOKEN to push packages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ching-kuo/emdash-blog

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Compute tags
        run: |
          echo "emdash_version=$(node -p "require('./package.json').dependencies.emdash")" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.emdash_version }}
            ${{ env.IMAGE }}:sha-${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
